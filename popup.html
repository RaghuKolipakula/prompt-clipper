<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 14px;
      margin: 0;
      background-color: #f9fafb;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .header img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }
    h3 {
      margin: 0;
      font-size: 15px;
      color: #111827;
      font-weight: 600;
    }
    p {
      font-size: 12px;
      color: #4b5563;
      margin: 0 0 14px 0;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:active {
      background-color: #1e40af;
    }
    #status {
      margin-top: 10px;
      padding: 6px;
      border-radius: 4px;
      background-color: #d1fae5;
      font-size: 12px;
      color: #065f46;
      text-align: center;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon128.png" alt="Icon">
    <h3>Page to Prompt</h3>
  </div>
  <p>Copy page content or highlighted text formatted clean for ChatGPT, Claude, & Gemini.</p>
  
  <button id="clipBtn">Copy Page Context</button>
  <div id="status">✓ Copied to Clipboard!</div>

  <script src="popup.js"></script>
</body>
</html>
